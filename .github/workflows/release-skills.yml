name: Release Skills

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package skills
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          for dir in skills/*; do
            if [[ -d "$dir" && -f "$dir/SKILL.md" ]]; then
              name=$(basename "$dir")
              (cd "$dir" && zip -r "../../dist/${name}.zip" . -x "**/.DS_Store")
            fi
          done

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
